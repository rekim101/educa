<!DOCTYPE html>
{% extends "base.html" %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> {% block title %}Logged out{% endblock %} </title>
</head>
<body>
    {% block content %}
        <h1>Logged out</h1>
        <div class="module">
            <p>You have been successfully logged out.
                You can <a href="{%url 'login'%}">log-in again</a>
            </p>
        </div>
    {% endblock %}
</body>
</html>
